<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Home</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/all.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body class="bg-slate-50 text-gray-800 font-sans antialiased min-h-screen">

 <header class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-gray-200 ">
<nav class="max-w-[1600px] mx-auto px-6 md:px-10 py-1 flex justify-between items-center   ">
 <div class= "w-32 h-auto sm:w-40">
  <a href="index.html" class="brand">
      <img src="./img/loge.png" alt="ShopEase Logo"class="w-full h-auto object-contain transition duration-300 hover:scale-105">
  </a>
  </div>
  <div class=" flex items-center gap-2 ">
    <a href="login.html"><button  class="btn border border-blue-500 text-blue-500 px-4 py-2 rounded-xl font-medium transition-all duration-300 hover:bg-blue-500 hover:text-white hover:shadow-md hover:-translate-y-0.5">Login</button> </a> 
    <a href="register.html"><button  class="btn border border-green-500 text-green-600  px-4 py-2 font-medium rounded-xl text-md hover:bg-green-600  transition-all duration-300 hover:text-white hover:shadow-md hover:-translate-y-0.5">Register</button> </a>

  </div>
</nav>
</header>

<section class="max-w-[1300px] mx-auto px-5 md:px-24 mt-12 ">
    <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-center justify-start w-full  ">
        
        <div class="relative w-full sm:w-[255px] h-[40px] shrink-0">
            <select id="searchType" aria-label="Search Type"onchange="searchProducts()" 
            class="w-full h-full border border-gray-300 rounded-xl pl-4 pr-10 bg-white text-gray-700 appearance-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all duration-300" >
                <option value="name">Search by Product Name</option>
                <option value="category">Search by Category</option>
            </select>


            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                <i class="fas fa-chevron-down text-[10px]"></i>
            </div>
        </div>
        
        <div class=" w-full sm:flex-1 h-[40px]">
            <input type="text" id="searchBox" autocomplete="off" spellcheck="false" placeholder="Search products..." oninput="searchProducts()"
            class="w-full h-full border border-gray-300 outline-none focus:outline-none rounded-xl px-4 text-[14px] placeholder-gray-400  focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all duration-300">
            
        </div>
        
        <button onclick="searchProducts()"
                class="w-full sm:w-[160px] bg-blue-600 text-white py-2 rounded-xl font-medium transition-all duration-300 hover:bg-blue-700 hover:shadow-lg hover:-translate-y-1">
             Search
          </button>
        
    </div>
</section>


<!-- Products Cards -->
<div
id="products-row"
class="max-w-[1300px] mx-auto px-6 pb-16">
</div>

<footer class="mt-20 border-t border-gray-200">
<div class="max-w-[1300px] mx-auto py-8 text-center text-gray-500 text-sm">
© 2026 ShopEase. All rights reserved.
</div>
</footer>

<script  src="js/script.js"></script>
<script src="js/user.js"></script> 
</body>
</html>
