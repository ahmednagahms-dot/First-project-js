









<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ShopEase</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/all.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body class="bg-slate-50 text-gray-800 font-sans antialiased min-h-screen">

 <header class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-gray-200 ">
<nav class="max-w-[1600px] mx-auto px-6 md:px-10 py-1 flex justify-between items-center   ">
 <div class= "w-32 h-auto sm:w-40">
  <a href="index.html" class="brand">
      <img src="./img/loge.png" alt="ShopEase Logo"class="w-full h-auto object-contain transition duration-300 hover:scale-105">
  </a>
  </div>


     <div class=" flex items-center gap-1 ">

<div class="flex items-center gap-8 pl-4 border-gray-200">
    <h2><span id="user-name"></span></h2>
    
 
<div class="relative pl-4 border-gray-200">
    <div onclick="toggleCartDropdown()" class="cursor-pointer flex items-center relative pr-2">
        <i id="cart-icon" class="fas fa-shopping-cart text-lg text-gray-700 hover:text-black transition-all duration-300 hover:scale-110"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
    </div>
    
    <div id="cart-dropdown" class="hidden absolute right-0 mt-3 w-80 bg-white rounded-lg shadow-xl border border-gray-100 z-50 overflow-hidden">
        <div class="p-3 bg-gray-50 border-b border-gray-100 font-semibold text-gray-700 text-sm flex justify-between items-center">
            <span>Shopping Cart</span>
            <button onclick="clearCart()" class="text-xs text-red-500 hover:underline font-normal">Clear All</button>
        </div>
        
        <div id="cart-dropdown-items" class="max-h-64 overflow-y-auto divide-y divide-gray-150">
            </div>
        
        <div class="p-4 bg-gray-50 border-t border-gray-100">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-medium text-gray-500">Total:</span>
                <span id="cart-total-price" class="text-base font-bold text-gray-900">$0</span>
            </div>
            <a href="card.html" class="block text-center bg-[#2d3238] hover:bg-black text-white py-2 rounded text-sm font-medium shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300">
                View All Products
            </a>
        </div>
    </div>
</div>

    <button id="logout-btn" onclick="logout()" class="btn border border-red-400 text-red-500 px-4 py-2  rounded-xl font-medium  text-md hover:bg-red-600 transition-all duration-300 hover:text-white hover:text-white hover:shadow-md hover:-translate-y-0.5" >Logout</button>
</div>

  </div>
</nav>
</header>


 <!-- Cart Items -->
  <div class="max-w-[1000px] mx-auto  p-6 mt-8">
    <div class="  flex flex-col justify-between w-full" id="cart-items">
    </div>
</div>
    <!-- Total Price -->
    <div class="container mt-3 mx-auto ">
        <h3 class="text-center text-2xl font-bold text-gray-800">Total Price: <span id="totalPrice" class="text-blue-600"></span></h3>
    </div>
    <hr>

    <div class="container max-w-[1000px] w-full mx-auto p-6 mt-[25px]">
    <h3 class="text-center favorite-title">Favorite Items</h3>
    <div id="favorite-items" class="favorite-items-container overflow-x-auto scrollbar scrollbar-thumb-slate-400 scrollbar-track-slate-200 hover:scrollbar-thumb-slate-500">     
        <!-- المنتجات سيتم توليدها هنا -->
    </div>
</div>
<footer class="mt-20 border-t border-gray-200">
<div class="max-w-[1300px] mx-auto py-8 text-center text-gray-500 text-sm">
© 2026 ShopEase. All rights reserved.
</div>
</footer>

<script  src="js/user.js"></script>
<script src="js/card.js"></script>
<script src="js/script.js"></script>
</body>
</html>
