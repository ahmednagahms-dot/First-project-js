<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Login</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/all.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body class=" text-gray-800 bg-white font-sans antialiased">


 <header class="w-full bg-gray-50 shadow-sm ">
<nav class="w-7xl  px-8 py-2 flex justify-between items-center ">
 <div class= "w-32 h-auto sm:w-40">
  <a class="brand" href="index.html">
      <img class="w-full h-auto object-contain transition duration-300 hover:scale-105" src="./img/loge.png" alt="Logo">
  </a>
  </div>
     </nav>
    </header>
 
  <main class="flex-grow flex items-center justify-center p-10">
        <div class="w-full max-w-6xl   bg-gray-50 p-8 rounded-xl border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
            <form id="loginForm" class="space-y-4">
                
                <div class="flex flex-col gap-1.5">
                    <label for="email" class="text-[#212529] text-[15px]">Email</label>
                    <input type="email" id="email" placeholder="Enter email" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-[15px]">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-[#212529] text-[15px]">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-[15px]">
                </div>

                <div class="flex items-center gap-2 pt-1">
                    <input type="checkbox" id="rememberMe" 
                        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="rememberMe" class="text-[#212529] text-[15px] select-none">Remember Me</label>
                </div>

                <div class="pt-2">
                    <button type="button" id="sign_in" onclick="login()"
                        class="bg-blue-500 text-white  px-4 py-2 font-medium rounded-xl text-md hover:bg-blue-700  transition-all duration-300 hover:text-white hover:shadow-md hover:-translate-y-0.5">
                        Login
                    </button>
                </div>

                <p class="text-[#212529] text-[15px] pt-2">
                    Don't have an account? <a href="register.html" class="text-[#007bff] hover:underline">Register</a>
                </p>
                
            </form>
        </div>
    </main>



<script  src="js/script.js"></script>
<script src="js/user.js"></script>
<script src="js/login.js"></script>



</body>
</html>
